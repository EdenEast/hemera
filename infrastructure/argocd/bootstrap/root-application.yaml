apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hemera-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:EdenEast/hemera.git
    targetRevision: argo-migration
    path: clusters/k3s
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - Prune=false
