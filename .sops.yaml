# sops recipient scaffold for Hemera Initial Setup.
#
# Replace these placeholder recipients before encrypting real secret material.
# The admin recipient can be created now. Host recipients must wait until the
# real Cluster Nodes have booted once and generated unique SSH host keys.
# Convert a host SSH public key to an age recipient with ssh-to-age, for example:
#   ssh-keyscan -t ed25519 192.168.2.81 | ssh-to-age

keys:
  - &admin age13t2y9dy344ss05kr0ysgvl42xgg6wkmzw5cgnrdkjea6x3tftdnsmy2tmh
  - &k8s_cp_01 age1562ws2s8xya8dhur9cm5k8wt8a4vdn6vwz5sdqawv2gy6xws74mq0q9cdt
  - &k8s_worker_01 age1cqv6v8fmghfzul8x44rjfrk8x8lp7k8xv76vx7av8ykuffjv9fuqptw5eg
  - &k8s_worker_02 age17l2c5wqk9lgq79kwkgw3hgkuklun5sn5rmy8j84gsj4f630psytq8ugeqe
creation_rules:
  - path_regex: ^nix/secrets/[^/]+\.yaml$
    encrypted_regex: ^(token)$
    key_groups:
      - age:
          - *admin
          - *k8s_cp_01
          - *k8s_worker_01
          - *k8s_worker_02
