defaultSettings:
  # Hemera currently runs all Cluster Nodes on Thor, a single Proxmox host with
  # one 1TB SSD. Two replicas reduce storage overhead while still preserving
  # useful node-level resilience inside the running k3s cluster. They do not
  # protect against Thor or its SSD failing.
  defaultReplicaCount: 2

  # TrueNAS-backed Longhorn backups are intentionally deferred. Replicas are not
  # backups, so do not treat Longhorn data as protected from accidental deletion
  # or physical Thor disk loss until a real backup target is configured later.
  backupTarget: ""

persistence:
  defaultClass: false
  defaultClassReplicaCount: 2
  defaultFsType: ext4
