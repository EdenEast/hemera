apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audiobookshelf-tailscale
  namespace: audiobookshelf
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - audiobookshelf
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: audiobookshelf
                port:
                  name: http
