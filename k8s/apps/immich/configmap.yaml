apiVersion: v1
kind: ConfigMap
metadata:
  name: immich-env
  namespace: immich
data:
  DB_HOSTNAME: immich-postgres
  DB_PORT: "5432"
  DB_USERNAME: immich
  DB_DATABASE_NAME: immich
  REDIS_HOSTNAME: immich-redis
  REDIS_PORT: "6379"
  IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
  IMMICH_TELEMETRY_INCLUDE: all
