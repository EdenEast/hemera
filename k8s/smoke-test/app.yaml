apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: hemera-smoke-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: local-path-smoke-test
---
apiVersion: v1
kind: Service
metadata:
  name: whoami-loadbalancer
  namespace: hemera-smoke-test
spec:
  type: LoadBalancer
  selector:
    app: whoami
  ports:
    - name: http
      port: 80
      targetPort: http
