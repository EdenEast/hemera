apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: forgejo-postgresql
  namespace: forgejo
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16

  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi

  managed:
    roles:
      - name: forgejo
        login: true

  bootstrap:
    initdb:
      database: forgejo
      owner: forgejo
      secret:
        name: forgejo-postgres-user

  storage:
    size: 10Gi
    storageClass: longhorn
