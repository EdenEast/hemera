apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15.0.2-rootless
          imagePullPolicy: IfNotPresent
          env:
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: forgejo-postgresql-rw.forgejo.svc.cluster.local:5432
            - name: FORGEJO__database__NAME
              value: forgejo
            - name: FORGEJO__database__USER
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-user
                  key: username
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-postgres-user
                  key: password
            - name: FORGEJO__database__SSL_MODE
              value: disable
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: FORGEJO__server__DOMAIN
              value: git.hemera.local
            - name: FORGEJO__server__ROOT_URL
              value: http://git.hemera.local/
            - name: FORGEJO__server__SSH_DOMAIN
              value: git.hemera.local
            - name: FORGEJO__server__DISABLE_SSH
              value: "false"
            - name: FORGEJO__server__START_SSH_SERVER
              value: "true"
            - name: FORGEJO__server__SSH_PORT
              value: "22"
            - name: FORGEJO__server__SSH_LISTEN_PORT
              value: "2222"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 2222
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
