apiVersion: apps/v1
kind: Deployment
metadata:
  name: manga
  namespace: manga
  labels:
    app.kubernetes.io/name: manga
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: manga
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: manga
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: suwayomi
          # version v2.3.2223 and above changed the extension store system and breaks extensions
          # https://github.com/Suwayomi/Suwayomi-Server/releases/tag/v2.3.2223
          image: ghcr.io/suwayomi/suwayomi-server:v2.2.2100
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Etc/UTC
            - name: BIND_IP
              value: 0.0.0.0
            - name: BIND_PORT
              value: "4567"
          ports:
            - name: http
              containerPort: 4567
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /home/suwayomi/.local/share/Tachidesk
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: suwayomi-data
