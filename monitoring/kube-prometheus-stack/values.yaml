defaultRules:
  create: true
  rules:
    etcd: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by:
        - namespace
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
    receivers:
      - name: "null"
  alertmanagerSpec:
    alertmanagerConfiguration:
      name: kube-prometheus-stack-alertmanager
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsTimezone: browser
  persistence:
    enabled: true
    type: sts
    storageClassName: longhorn
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      isDefaultDatasource: true
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      jsonData:
        maxLines: 1000

prometheus:
  additionalPodMonitors:
    - name: flux-system
      namespaceSelector:
        matchNames:
          - flux-system
      selector:
        matchLabels:
          app.kubernetes.io/part-of: flux
      podMetricsEndpoints:
        - port: http-prom
          interval: 30s
  prometheusSpec:
    externalUrl: https://prometheus.cerberus-tilapia.ts.net
    retention: 14d
    scrapeInterval: 30s
    evaluationInterval: 30s
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

additionalPrometheusRulesMap:
  hemera-cluster-health:
    groups:
      - name: hemera.cluster-health
        rules:
          - alert: HemeraNodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: Cluster Node is not Ready
              description: "{{ $labels.node }} has been NotReady for more than 10 minutes."
          - alert: HemeraPodCrashLooping
            expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff",namespace!~"kube-system|monitoring"}[5m]) >= 1
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Pod is crash looping
              description: "{{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} is in CrashLoopBackOff."
          - alert: HemeraDeploymentReplicasUnavailable
            expr: kube_deployment_status_replicas_unavailable > 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: Deployment has unavailable replicas
              description: "{{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas for more than 15 minutes."
          - alert: HemeraPersistentVolumeClaimPending
            expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: PersistentVolumeClaim is pending
              description: "{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} has been pending for more than 15 minutes."
          - alert: HemeraFluxKustomizationNotReady
            expr: gotk_reconcile_condition{kind="Kustomization",type="Ready",status="False"} == 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Flux Kustomization is not ready
              description: "Flux Kustomization {{ $labels.name }} in {{ $labels.namespace }} is not ready."
          - alert: HemeraFluxHelmReleaseNotReady
            expr: gotk_reconcile_condition{kind="HelmRelease",type="Ready",status="False"} == 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Flux HelmRelease is not ready
              description: "Flux HelmRelease {{ $labels.name }} in {{ $labels.namespace }} is not ready."
