apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - source.yaml
  - release.yaml
  - ingress.yaml
  - discord-webhook.sealed.yaml
  - alertmanager-config.yaml
configMapGenerator:
  - name: kube-prometheus-stack-values
    files:
      - values.yaml=values.yaml
generatorOptions:
  disableNameSuffixHash: true
